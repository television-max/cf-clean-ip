name: daily-scan

on:
  schedule:
    - cron: '0 0 * * *'   # هر روز ساعت 00:00 UTC
  workflow_dispatch:        # اجازه اجرای دستی

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: دریافت کد از repository
        uses: actions/checkout@v4

      - name: نصب Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: نصب کتابخانه‌های مورد نیاز
        run: |
          pip install requests

      - name: اجرای اسکنر
        run: python scanner.py

      - name: ذخیره نتایج در GitHub
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add clean_ips.txt
          git diff --staged --quiet || git commit -m "به‌روزرسانی آیپی‌های تمیز [skip ci]"
          git push
